<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sky Player - Reseller Panel</title>
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sky Player" />
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <script>
      // Force clear service workers from previous versions
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      // Check for version mismatch and force reload if needed
      const CURRENT_VERSION = '4.0.0-ULTRA';
      const storedVersion = localStorage.getItem('app_version');
      if (storedVersion && storedVersion !== CURRENT_VERSION) {
        console.log('Version mismatch detected, clearing cache and reloading...');
        localStorage.clear();
        sessionStorage.clear();
        localStorage.setItem('app_version', CURRENT_VERSION);
        window.location.reload(true);
      } else {
        localStorage.setItem('app_version', CURRENT_VERSION);
      }
    </script>
    
    <!-- Smart TV Compatibility -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sky Player">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-navbutton-color" content="#00AEEF">
    
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Smart TV Remote Back Button Handling
      window.addEventListener('keydown', function(e) {
        // Common TV Back Button KeyCodes: 
        // 10009 (Tizen), 461 (webOS), 8 (Android TV), 27 (Escape)
        if (e.keyCode === 10009 || e.keyCode === 461 || e.keyCode === 8 || e.keyCode === 27) {
          if (window.location.pathname !== '/') {
            e.preventDefault();
            window.history.back();
          }
        }
      });
    </script>
  </body>
</html>
