<!doctype html>
<html lang="fr" translate="no">
  <head>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('WebSocket') || e.message.includes('HMR'))) return;
        console.error('GLOBAL ERROR:', e);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason ? e.reason.toString() : '';
        if (reason.includes('WebSocket') || reason.includes('websocket')) return;
        console.error('UNHANDLED REJECTION:', e);
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sky Player - Reseller Panel</title>
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sky Player" />
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <script>
      // Force clear service workers from previous versions
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      // Check for version mismatch and force reload if needed
      try {
        const CURRENT_VERSION = '4.0.0-ULTRA';
        const storedVersion = localStorage.getItem('app_version');
        if (storedVersion && storedVersion !== CURRENT_VERSION) {
          console.log('Version mismatch detected, clearing cache and reloading...');
          localStorage.clear();
          sessionStorage.clear();
          localStorage.setItem('app_version', CURRENT_VERSION);
          window.location.reload(true);
        } else {
          localStorage.setItem('app_version', CURRENT_VERSION);
        }
      } catch (err) {
        console.warn('Could not access localStorage for version check', err);
      }
    </script>
    
    <!-- Smart TV Compatibility -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sky Player">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-navbutton-color" content="#00AEEF">
    
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Smart TV Remote Back Button Handling
      window.addEventListener('keydown', function(e) {
        // Common TV Back Button KeyCodes: 
        // 10009 (Tizen), 461 (webOS), 8 (Android TV), 27 (Escape)
        if (e.keyCode === 10009 || e.keyCode === 461 || e.keyCode === 8 || e.keyCode === 27) {
          // If the user is typing in an input or textarea, don't intercept Backspace (8)
          const target = e.target;
          const isInput = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable;
          
          if (e.keyCode === 8 && isInput) {
            return; // Let the default backspace behavior happen (deleting text)
          }

          if (window.location.pathname !== '/') {
            e.preventDefault();
            window.history.back();
          }
        }
      });
    </script>
  </body>
</html>
